name: CI

on:
  push:
  pull_request:

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - name: Go test
        run: |
          cd orchestrator
          go test ./...

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Syntax check
        run: |
          python -m py_compile sync_entities.py
          python -m py_compile homeassistant/custom_components/zagato_agent/*.py
